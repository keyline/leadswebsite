[PHP]
display_errors = Off
max_execution_time = 900
max_input_time = 900
max_input_vars = 1000
memory_limit = 4096M
post_max_size = 4096M
session.gc_maxlifetime = 14400
session.save_path = "/var/cpanel/php/sessions/alt-php81"
upload_max_filesize = 2048M
zlib.output_compression = Off
